name: Screenshots

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Render preview screenshots
        run: ./gradlew updateDebugScreenshotTest --no-daemon

      - name: Upload rendered screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screen-previews
          path: app/src/screenshotTestDebug/reference/**
          if-no-files-found: error
